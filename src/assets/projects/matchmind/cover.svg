  <text x="120" y="560" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="700">MatchMind</text>
  <text x="120" y="610" fill="#8ecdff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28">Football analytics for faster tactical decisions</text>
