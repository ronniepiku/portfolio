<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">MatchMind Cover</title>
  <desc id="desc">Illustrative football analytics dashboard cover for MatchMind.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1f6bf5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="920" cy="130" r="220" fill="#59b0ff" opacity="0.18"/>
  <circle cx="170" cy="610" r="220" fill="#59b0ff" opacity="0.12"/>
  <rect x="120" y="120" width="620" height="360" rx="20" fill="#161922" stroke="#3b8eff" stroke-opacity="0.5"/>
  <rect x="160" y="170" width="250" height="130" rx="14" fill="#1e222e"/>
  <rect x="430" y="170" width="270" height="130" rx="14" fill="#1e222e"/>
