<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">EIT Sim2Real Cover</title>
  <desc id="desc">Illustrative tactile sensing and simulation-to-reality transfer cover.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#272c3a"/>
    </linearGradient>
    <radialGradient id="heat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#59b0ff"/>
      <stop offset="100%" stop-color="#1f6bf5" stop-opacity="0.1"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="90" y="100" width="470" height="470" rx="24" fill="#161922" stroke="#3b8eff" stroke-opacity="0.45"/>
  <rect x="640" y="100" width="470" height="470" rx="24" fill="#161922" stroke="#3b8eff" stroke-opacity="0.45"/>
  <circle cx="325" cy="335" r="180" fill="url(#heat)"/>
  <circle cx="875" cy="335" r="180" fill="url(#heat)" opacity="0.8"/>
  <path d="M560 338 L640 338" stroke="#8ecdff" stroke-width="6" stroke-dasharray="8 10"/>
  <text x="120" y="620" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">EIT Sim2Real</text>
  <text x="120" y="655" fill="#8ecdff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26">Noise-aware training for robust tactile sensing</text>
</svg>
